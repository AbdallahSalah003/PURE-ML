<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phishing Detector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      min-height: 420px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      padding: 20px;
    }

    /* ── Header ────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: #3b82f6;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #f1f5f9;
    }

    .header p {
      font-size: 11px;
      color: #64748b;
    }

    /* ── Input area ────────────────────────────────────────── */
    .input-label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 12px;
    }

    #url-input {
      width: 100%;
      padding: 10px 40px 10px 12px;
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
      font-family: "Courier New", monospace;
    }

    #url-input:focus {
      border-color: #3b82f6;
    }

    #url-input::placeholder {
      color: #4a5568;
    }

    .clear-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #4a5568;
      cursor: pointer;
      font-size: 14px;
      padding: 2px;
      display: none;
    }

    .clear-btn:hover {
      color: #94a3b8;
    }

    /* ── Check button ──────────────────────────────────────── */
    #check-btn {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 16px;
    }

    #check-btn:hover:not(:disabled) {
      background: #2563eb;
    }

    #check-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    #check-btn:disabled {
      background: #1e3a5f;
      color: #4a5568;
      cursor: not-allowed;
    }

    /* ── Loading state ─────────────────────────────────────── */
    .loading {
      display: none;
      text-align: center;
      padding: 24px 0;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #1e2330;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading p {
      font-size: 12px;
      color: #64748b;
    }

    .loading .loading-step {
      font-size: 11px;
      color: #475569;
      margin-top: 4px;
    }

    /* ── Result card ───────────────────────────────────────── */
    .result {
      display: none;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .result.safe {
      background: #052e16;
      border: 1px solid #166534;
    }

    .result.danger {
      background: #2d0707;
      border: 1px solid #991b1b;
    }

    .result.warning {
      background: #1c1400;
      border: 1px solid #92400e;
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .result-icon {
      font-size: 24px;
      line-height: 1;
    }

    .result-title {
      font-size: 15px;
      font-weight: 700;
    }

    .result.safe  .result-title { color: #4ade80; }
    .result.danger .result-title { color: #f87171; }
    .result.warning .result-title { color: #fbbf24; }

    .result-subtitle {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    /* ── Probability bar ───────────────────────────────────── */
    .prob-section {
      margin-bottom: 12px;
    }

    .prob-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 5px;
    }

    .prob-bar-bg {
      height: 6px;
      background: #1e2330;
      border-radius: 3px;
      overflow: hidden;
    }

    .prob-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    .safe  .prob-bar-fill { background: #4ade80; }
    .danger .prob-bar-fill { background: #f87171; }
    .warning .prob-bar-fill { background: #fbbf24; }

    /* ── Details grid ──────────────────────────────────────── */
    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .detail-item {
      background: rgba(255,255,255,0.04);
      border-radius: 6px;
      padding: 7px 9px;
    }

    .detail-label {
      font-size: 10px;
      color: #64748b;
      margin-bottom: 2px;
    }

    .detail-value {
      font-size: 12px;
      font-weight: 600;
      color: #cbd5e1;
    }

    /* ── Error state ───────────────────────────────────────── */
    .error-box {
      display: none;
      background: #1a0a0a;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      color: #fca5a5;
    }

    /* ── History section ───────────────────────────────────── */
    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .history-title {
      font-size: 11px;
      color: #64748b;
      font-weight: 500;
    }

    .clear-history-btn {
      font-size: 10px;
      color: #475569;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
    }

    .clear-history-btn:hover { color: #94a3b8; }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 100px;
      overflow-y: auto;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: #1e2330;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .history-item:hover { background: #252d3d; }

    .history-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .history-dot.safe   { background: #4ade80; }
    .history-dot.danger { background: #f87171; }

    .history-url {
      font-size: 11px;
      color: #94a3b8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .history-prob {
      font-size: 10px;
      color: #475569;
      flex-shrink: 0;
    }

    /* ── Footer ────────────────────────────────────────────── */
    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 10px;
      color: #334155;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">🛡</div>
    <div>
      <h1>Phishing Detector</h1>
      <p>Powered by XGBoost</p>
    </div>
  </div>

  <!-- Input -->
  <div class="input-label">Enter URL to check</div>
  <div class="input-wrapper">
    <input
      id="url-input"
      type="text"
      placeholder="https://example.com/path?param=value"
      autocomplete="off"
      spellcheck="false"
    />
    <button class="clear-btn" id="clear-input-btn">✕</button>
  </div>

  <button id="check-btn" disabled>Check URL</button>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Analysing URL...</p>
    <div class="loading-step" id="loading-step">Extracting features</div>
  </div>

  <!-- Result -->
  <div class="result" id="result">
    <div class="result-header">
      <div class="result-icon" id="result-icon"></div>
      <div>
        <div class="result-title" id="result-title"></div>
        <div class="result-subtitle" id="result-url"></div>
      </div>
    </div>

    <div class="prob-section">
      <div class="prob-label">
        <span>Phishing probability</span>
        <span id="prob-value"></span>
      </div>
      <div class="prob-bar-bg">
        <div class="prob-bar-fill" id="prob-bar"></div>
      </div>
    </div>

    <div class="details-grid">
      <div class="detail-item">
        <div class="detail-label">Confidence</div>
        <div class="detail-value" id="detail-confidence"></div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Verdict</div>
        <div class="detail-value" id="detail-verdict"></div>
      </div>
    </div>
  </div>

  <!-- Error -->
  <div class="error-box" id="error-box"></div>

  <!-- History -->
  <div id="history-section" style="display:none; margin-top: 16px;">
    <div class="history-header">
      <span class="history-title">Recent checks</span>
      <button class="clear-history-btn" id="clear-history-btn">Clear</button>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>

  <!-- Footer -->
  <div class="footer"></div>

  <script src="popup.js"></script>
</body>
</html>
